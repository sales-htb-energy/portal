<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業部ポータル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --navy:    #0F2D5C;
  --blue:    #1A5CB8;
  --sky:     #3B82F6;
  --teal:    #0D7A6E;
  --bg:      #F4F6FA;
  --surface: #FFFFFF;
  --border:  #E4E8F0;
  --text-1:  #0D1B2A;
  --text-2:  #4A5568;
  --text-3:  #9AA5B4;
  --danger:  #DC2626;
  --warn:    #D97706;
  --ok:      #16A34A;
  --radius:  10px;
  --shadow:  0 1px 3px rgba(15,45,92,.06), 0 4px 12px rgba(15,45,92,.04);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text-1);
  min-height: 100vh; font-size: 15px; line-height: 1.6;
}
.topbar {
  background: var(--navy); padding: 0 2rem; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-icon {
  width: 30px; height: 30px; background: var(--sky); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-icon i { color: #fff; font-size: 16px; }
.topbar-title { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.02em; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-date { font-size: 13px; color: rgba(255,255,255,0.6); }
.topbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
.topbar-user {
  width: 30px; height: 30px; border-radius: 50%; background: var(--sky);
  display: flex; align-items: center; justify-content: center;
}
.topbar-user i { color: #fff; font-size: 15px; }
.page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
.sec-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.sec-title { font-size: 19px; font-weight: 700; color: var(--navy); letter-spacing: -0.02em; }
.sec-count { font-size: 13px; color: var(--text-3); margin-left: auto; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
}
.section { margin-bottom: 2.5rem; }

/* お知らせ */
.news-list { padding: 0 1.5rem; }
.news-row {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: start; gap: 14px; padding: 16px 0;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s;
}
.news-row:last-child { border-bottom: none; }
.news-row:hover { background: #F8FAFF; margin: 0 -1.5rem; padding-left: 1.5rem; padding-right: 1.5rem; }
.tag {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 4px;
  white-space: nowrap; margin-top: 2px; letter-spacing: 0.04em;
}
.tag-重要 { background: #FEF2F2; color: var(--danger); }
.tag-製品 { background: #EFF6FF; color: var(--blue); }
.tag-社内 { background: #F0FDF4; color: var(--ok); }
.tag-default { background: #F3F4F6; color: var(--text-2); }
.news-title { font-size: 15px; font-weight: 500; color: var(--text-1); line-height: 1.5; }
.news-row:hover .news-title { color: var(--blue); }
.news-date { font-size: 13px; color: var(--text-3); margin-top: 2px; white-space: nowrap; }
.news-empty { padding: 2rem; text-align: center; color: var(--text-3); font-size: 14px; }

/* 営業実績 */
.kpi-two-col { display: grid; grid-template-columns: 1fr 1fr; }
.kpi-segment { padding: 1.5rem; }
.kpi-segment:first-child { border-right: 1px solid var(--border); }
.kpi-seg-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border);
}
.kpi-seg-bar { width: 5px; height: 24px; border-radius: 3px; flex-shrink: 0; }
.kpi-seg-name { font-size: 18px; font-weight: 700; letter-spacing: 0.01em; }
.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.kpi-tile {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; position: relative; overflow: hidden;
}
.kpi-tile::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.kpi-tile.c-blue::before { background: var(--blue); }
.kpi-tile.c-teal::before { background: var(--teal); }
.kpi-lbl { font-size: 12px; color: var(--text-2); font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
.kpi-val { font-size: 26px; font-weight: 700; color: var(--text-1); line-height: 1; }
.kpi-unit { font-size: 14px; font-weight: 500; color: var(--text-2); margin-left: 4px; }

/* 資料格納 */
.links-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
.link-cell {
  display: flex; align-items: center; gap: 14px; padding: 20px 22px;
  background: var(--surface); text-decoration: none; cursor: pointer; transition: background 0.15s;
}
.link-cell:hover { background: #F8FAFF; }
.link-ico { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.link-ico i { font-size: 19px; }
.link-name { font-size: 14px; font-weight: 600; color: var(--text-1); }
.link-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.link-arrow { margin-left: auto; color: var(--text-3); font-size: 15px; }

/* スケジュール */
.month-tabs { display: flex; gap: 6px; padding: 14px 20px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-wrap: wrap; }
.month-tab { font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text-2); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.month-tab:hover { background: var(--bg); color: var(--text-1); }
.month-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.schedule-wrap { display: grid; grid-template-columns: auto 1fr; }
.cal-panel { padding: 1.5rem; border-right: 1px solid var(--border); min-width: 240px; }
.cal-nav-month { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
.cal-table { width: 100%; border-collapse: collapse; }
.cal-table th { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-3); padding: 5px 0; }
.cal-table td {
  text-align: center; font-size: 13px; padding: 6px 2px;
  color: var(--text-2); cursor: pointer; border-radius: 4px; position: relative;
}
.cal-table td:hover { background: var(--bg); }
.cal-table td.today { background: var(--blue); color: #fff; font-weight: 700; border-radius: 6px; }
.cal-table td.has-ev::after {
  content: ''; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--warn);
}
.cal-table td.today.has-ev::after { background: #fff; }
.cal-table td.selected { background: #EFF6FF; color: var(--blue); font-weight: 700; border-radius: 6px; }
.cal-table td.selected.has-ev::after { background: var(--blue); }
.cal-table td.dim { color: var(--border); cursor: default; }
.cal-table td.dim:hover { background: transparent; }

.events-panel { padding: 1.5rem; display: flex; flex-direction: column; }
.events-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.events-title { font-size: 14px; font-weight: 700; color: var(--text-2); }
.events-reset {
  font-size: 12px; color: var(--blue); cursor: pointer;
  background: none; border: none; padding: 2px 8px;
  border-radius: 4px; display: none;
}
.events-reset:hover { background: #EFF6FF; }
.events-reset.visible { display: block; }
.events-scroll { overflow-y: auto; max-height: 320px; }
.ev-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.ev-item:last-child { border-bottom: none; }
.ev-time-col { text-align: right; min-width: 64px; flex-shrink: 0; }
.ev-date-lbl { font-size: 11px; color: var(--text-3); font-weight: 500; }
.ev-time-lbl { font-size: 14px; font-weight: 600; color: var(--text-2); }
.ev-bar { width: 3px; border-radius: 2px; flex-shrink: 0; margin: 2px 0; }
.ev-body { flex: 1; }
.ev-name { font-size: 14px; font-weight: 500; color: var(--text-1); }
.ev-sub { font-size: 12px; color: var(--text-3); margin-top: 3px; }
.ev-empty { padding: 2rem; text-align: center; color: var(--text-3); font-size: 14px; }

@media (max-width: 768px) {
  .topbar { padding: 0 1rem; }
  .page { padding: 1.25rem 1rem; }
  .kpi-two-col { grid-template-columns: 1fr; }
  .kpi-segment:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  .links-grid { grid-template-columns: repeat(2, 1fr); }
  .schedule-wrap { grid-template-columns: 1fr; }
  .cal-panel { border-right: none; border-bottom: 1px solid var(--border); }
}
@media (max-width: 480px) {
  .links-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon"><i class="ti ti-bolt"></i></div>
    <span class="topbar-title">営業部ポータル</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-date" id="today-date"></span>
    <div class="topbar-divider"></div>
    <div class="topbar-user"><i class="ti ti-user"></i></div>
  </div>
</nav>

<main class="page">

  <!-- お知らせ -->
  <section class="section">
    <div class="sec-head">
      <h2 class="sec-title">お知らせ</h2>
      <span class="sec-count" id="news-count"></span>
    </div>
    <div class="card">
      <div class="news-list" id="news-list">
        <div class="news-empty">読み込み中…</div>
      </div>
    </div>
  </section>

  <!-- 営業実績 -->
  <section class="section">
    <div class="sec-head">
      <h2 class="sec-title" id="kpi-title">営業実績</h2>
    </div>
    <div class="card">
      <div class="kpi-two-col">
        <div class="kpi-segment">
          <div class="kpi-seg-head">
            <div class="kpi-seg-bar" style="background:var(--blue)"></div>
            <span class="kpi-seg-name" style="color:var(--blue)">高圧</span>
          </div>
          <div class="kpi-grid">
            <div class="kpi-tile c-blue">
              <div class="kpi-lbl">ストックアップ</div>
              <div class="kpi-val"><span id="kpi-high-stock">—</span><span class="kpi-unit">円</span></div>
            </div>
            <div class="kpi-tile c-blue">
              <div class="kpi-lbl">契約 kW</div>
              <div class="kpi-val"><span id="kpi-high-kw">—</span><span class="kpi-unit">kW</span></div>
            </div>
            <div class="kpi-tile c-blue">
              <div class="kpi-lbl">拠点数</div>
              <div class="kpi-val"><span
