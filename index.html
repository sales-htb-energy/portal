<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業部ポータル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --navy:    #0F2D5C;
  --blue:    #1A5CB8;
  --sky:     #3B82F6;
  --teal:    #0D7A6E;
  --bg:      #F4F6FA;
  --surface: #FFFFFF;
  --border:  #E4E8F0;
  --text-1:  #0D1B2A;
  --text-2:  #4A5568;
  --text-3:  #9AA5B4;
  --danger:  #DC2626;
  --warn:    #D97706;
  --ok:      #16A34A;
  --radius:  10px;
  --shadow:  0 1px 3px rgba(15,45,92,.06), 0 4px 12px rgba(15,45,92,.04);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text-1);
  min-height: 100vh; font-size: 15px; line-height: 1.6;
}
.topbar {
  background: var(--navy); padding: 0 2rem; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-icon {
  width: 30px; height: 30px; background: var(--sky); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-icon i { color: #fff; font-size: 16px; }
.topbar-title { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.02em; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-date { font-size: 13px; color: rgba(255,255,255,0.6); }
.topbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
.topbar-user {
  width: 30px; height: 30px; border-radius: 50%; background: var(--sky);
  display: flex; align-items: center; justify-content: center;
}
.topbar-user i { color: #fff; font-size: 15px; }
.page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
.sec-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.sec-title { font-size: 19px; font-weight: 700; color: var(--navy); letter-spacing: -0.02em; }
.sec-count { font-size: 13px; color: var(--text-3); margin-left: auto; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
}
.section { margin-bottom: 2.5rem; }

/* お知らせ */
.news-list { padding: 0 1.5rem; }
.news-row {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: start; gap: 14px; padding: 16px 0;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s;
}
.news-row:last-child { border-bottom: none; }
.news-row:hover { background: #F8FAFF; margin: 0 -1.5rem; padding-left: 1.5rem; padding-right: 1.5rem; }
.tag {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 4px;
  white-space: nowrap; margin-top: 2px; letter-spacing: 0.04em;
}
.tag-重要 { background: #FEF2F2; color: var(--danger); }
.tag-製品 { background: #EFF6FF; color: var(--blue); }
.tag-社内 { background: #F0FDF4; color: var(--ok); }
.tag-default { background: #F3F4F6; color: var(--text-2); }
.news-title { font-size: 15px; font-weight: 500; color: var(--text-1); line-height: 1.5; }
.news-row:hover .news-title { color: var(--blue); }
.news-date { font-size: 13px; color: var(--text-3); margin-top: 2px; white-space: nowrap; }
.news-empty { padding: 2rem; text-align: center; color: var(--text-3); font-size: 14px; }

/* 営業実績 */
.kpi-two-col { display: grid; grid-template-columns: 1fr 1fr; }
.kpi-segment { padding: 1.5rem; }
.kpi-segment:first-child { border-right: 1px solid var(--border); }
.kpi-seg-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border);
}
.kpi-seg-bar { width: 5px; height: 24px; border-radius: 3px; flex-shrink: 0; }
.kpi-seg-name { font-size: 18px; font-weight: 700; letter-spacing: 0.01em; }
.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.kpi-tile {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; position: relative; overflow: hidden;
}
.kpi-tile::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.kpi-tile.c-blue::before { background: var(--blue); }
.kpi-tile.c-teal::before { background: var(--teal); }
.kpi-lbl { font-size: 12px; color: var(--text-2); font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
.kpi-val { font-size: 26px; font-weight: 700; color: var(--text-1); line-height: 1; }
.kpi-unit { font-size: 14px; font-weight: 500; color: var(--text-2); margin-left: 4px; }

/* 資料格納 */
.links-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
.link-cell {
  display: flex; align-items: center; gap: 14px; padding: 20px 22px;
  background: var(--surface); text-decoration: none; cursor: pointer; transition: background 0.15s;
}
.link-cell:hover { background: #F8FAFF; }
.link-ico { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.link-ico i { font-size: 19px; }
.link-name { font-size: 14px; font-weight: 600; color: var(--text-1); }
.link-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.link-arrow { margin-left: auto; color: var(--text-3); font-size: 15px; }

/* 申し込みスケジュール */
.schedule-filter {
  display: flex; gap: 8px; padding: 16px 24px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center;
}
.filter-label { font-size: 13px; color: var(--text-3); margin-right: 4px; font-weight: 500; }
.filter-btn {
  font-size: 13px; font-weight: 500; padding: 6px 16px;
  border-radius: 99px; border: 1px solid var(--border);
  background: transparent; color: var(--text-2); cursor: pointer;
  white-space: nowrap; transition: all 0.15s;
}
.filter-btn:hover { background: var(--bg); color: var(--text-1); }
.filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

.schedule-table-wrap { overflow-x: auto; }
.schedule-table { width: 100%; border-collapse: collapse; }
.schedule-table colgroup col.col-area { width: 140px; }
.schedule-table colgroup col.col-supply { width: auto; }
.schedule-table colgroup col.col-date { width: 130px; }

.schedule-table thead tr {
  background: var(--bg);
  border-bottom: 2px solid var(--border);
}
.schedule-table thead th {
  font-size: 13px; font-weight: 700; color: var(--text-2);
  padding: 14px 20px; text-align: left;
}
.schedule-table thead th.date-col {
  text-align: center;
  border-left: 1px solid var(--border);
}
.schedule-table thead th .date-sub {
  font-size: 11px; font-weight: 400; color: var(--text-3);
  display: block; margin-top: 2px;
}

.schedule-table tbody tr { border-bottom: 1px solid var(--border); }
.schedule-table tbody tr:last-child { border-bottom: none; }
.schedule-table tbody tr:hover { background: #F8FAFF; }
.schedule-table tbody tr.hidden { display: none; }
.schedule-table tbody td { padding: 16px 20px; vertical-align: middle; }
.schedule-table tbody td.date-cell {
  text-align: center;
  border-left: 1px solid var(--border);
}

.area-badge {
  display: inline-block; font-size: 12px; font-weight: 600;
  padding: 4px 10px; border-radius: 6px;
  background: #EFF6FF; color: var(--blue); white-space: nowrap;
}
.area-badge.all { background: #F0FDF4; color: var(--ok); }

.supply-text { font-size: 14px; color: var(--text-1); line-height: 1.7; }

.date-val {
  display: inline-block;
  font-size: 15px; font-weight: 700; color: var(--blue);
  background: #EFF6FF; padding: 4px 12px; border-radius: 6px;
}
.date-empty { font-size: 13px; color: var(--text-3); }
.schedule-empty { padding: 2rem; text-align: center; color: var(--text-3); font-size: 14px; }

@media (max-width: 768px) {
  .topbar { padding: 0 1rem; }
  .page { padding: 1.25rem 1rem; }
  .kpi-two-col { grid-template-columns: 1fr; }
  .kpi-segment:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  .links-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .links-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon"><i class="ti ti-bolt"></i></div>
    <span class="topbar-title">営業部ポータル</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-date" id="today-date"></span>
    <div class="topbar-divider"></div>
    <div class="topbar-user"><i class="ti ti-user"></i></div>
  </div>
</nav>

<main class="page">

  <!-- お知らせ -->
  <section class="section">
    <div class="sec-head">
      <h2 class="sec-title">お知らせ</h2>
      <span class="sec-count" id="news-count"></span>
    </div>
    <div class="card">
      <div class="news-list" id="news-list">
        <div class="news-empty">読み込み中…</div>
      </div>
    </div>
  </section>

  <!-- 営業実績 -->
  <section class="section">
    <div class="sec-head">
      <h2 class="sec-title" id="kpi-title">営業実績</h2>
    </div>
    <div class="card">
      <div class="kpi-two-col">
        <div class="kpi-segment">
          <div class="kpi-seg-head">
            <div class="kpi-seg-bar" style="background:var(--blue)"></div>
            <span class="kpi-seg-name" style="color:var(--blue)">高圧</span>
          </div>
          <div class="kpi-grid">
            <div class="kpi-tile c-blue">
              <div class="kpi-lbl">ストックアップ</div>
              <div class="kpi-val"><span id="kpi-high-stock">—</span><span class="kpi-unit">円</span></div>
            </div>
            <div class="kpi-tile c-blue">
              <div class="kpi-lbl">契約 kW</div>
              <div class="kpi-val"><span id="kpi-high-kw">—</span><span class="kpi-unit">kW</span></div>
            </div>
            <div class="kpi-tile c-blue">
              <div class="kpi-lbl">拠点数</div>
              <div class="kpi-val"><span id="kpi-high-base">—</span><span class="kpi-unit">拠点</span></div>
            </div>
            <div class="kpi-tile c-blue">
              <div class="kpi-lbl">5年将来収益</div>
              <div class="kpi-val"><span id="kpi-high-future">—</span><span class="kpi-unit">円</span></div>
            </div>
          </div>
        </div>
        <div class="kpi-segment">
          <div class="kpi-seg-head">
            <div class="kpi-seg-bar" style="background:var(--teal)"></div>
            <span class="kpi-seg-name" style="color:var(--teal)">低圧法人</span>
          </div>
          <div class="kpi-grid">
            <div class="kpi-tile c-teal">
              <div class="kpi-lbl">ストックアップ</div>
              <div class="kpi-val"><span id="kpi-low-stock">—</span><span class="kpi-unit">円</span></div>
            </div>
            <div class="kpi-tile c-teal">
              <div class="kpi-lbl">拠点数</div>
              <div class="kpi-val"><span id="kpi-low-base">—</span><span class="kpi-unit">拠点</span></div>
            </div>
            <div class="kpi-tile c-teal">
              <div class="kpi-lbl">5年将来収益</div>
              <div class="kpi-val"><span id="kpi-low-future">—</span><span class="kpi-unit">円</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 資料格納リンク集 -->
  <section class="section">
    <div class="sec-head">
      <h2 class="sec-title">資料格納リンク集</h2>
    </div>
    <div class="card">
      <div class="links-grid" id="links-grid">
        <div style="padding:2rem;text-align:center;color:var(--text-3);font-size:14px;grid-column:span 3">読み込み中…</div>
      </div>
    </div>
  </section>

  <!-- フロー別格納資料 -->
  <section class="section">
    <div class="sec-head">
      <h2 class="sec-title">フロー別格納資料</h2>
    </div>
    <div class="card">
      <div class="links-grid" id="flow-grid">
        <div style="padding:2rem;text-align:center;color:var(--text-3);font-size:14px;grid-column:span 3">読み込み中…</div>
      </div>
    </div>
  </section>

  <!-- エナリス申し込みスケジュール -->
  <section class="section">
    <div class="sec-head">
      <h2 class="sec-title">エナリス申し込みスケジュール</h2>
    </div>
    <div class="card">
      <div class="schedule-filter" id="schedule-filter">
        <span class="filter-label">エリア</span>
        <button class="filter-btn active" onclick="filterSchedule('all', this)">すべて</button>
      </div>
      <div class="schedule-table-wrap">
        <table class="schedule-table">
          <colgroup>
            <col class="col-area">
            <col class="col-supply">
            <col class="col-date">
            <col class="col-date">
            <col class="col-date">
          </colgroup>
          <thead>
            <tr>
              <th>エリア</th>
              <th>供給区分</th>
              <th class="date-col">8月開始<span class="date-sub">依頼目安</span></th>
              <th class="date-col">9月開始<span class="date-sub">依頼目安</span></th>
              <th class="date-col">10月開始<span class="date-sub">依頼目安</span></th>
            </tr>
          </thead>
          <tbody id="schedule-body">
            <tr><td colspan="5" class="schedule-empty">読み込み中…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<script>
  const SHEET_ID = '1ajIdOpxMbJqcvVJKxr9ZQY0ILIpGBkeWPYKDl5dAH_k';
  const API_KEY  = 'AIzaSyCbbtvRUpkn7e29d9HGj8yalSS0LY4TmaU';

  const now = new Date();
  const DAYS   = ['日','月','火','水','木','金','土'];
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const currentMonth = now.getMonth() + 1;

  document.getElementById('today-date').textContent =
    `${now.getFullYear()}年${currentMonth}月${now.getDate()}日（${DAYS[now.getDay()]}）`;
  document.getElementById('kpi-title').textContent =
    `${MONTHS[now.getMonth()]}の営業実績`;

  async function fetchSheet(sheetName) {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return (data.values || []).slice(1);
  }

  function fmt(num) {
    if (num === null || isNaN(num)) return '—';
    return Math.round(num).toLocaleString('ja-JP');
  }

  const COLOR_MAP = {
    blue:   { bg: '#EFF6FF', fg: '#1A5CB8' },
    green:  { bg: '#F0FDF4', fg: '#16A34A' },
    yellow: { bg: '#FFFBEB', fg: '#D97706' },
    teal:   { bg: '#F0FDFA', fg: '#0D7A6E' },
    red:    { bg: '#FEF2F2', fg: '#DC2626' },
    purple: { bg: '#F5F3FF', fg: '#7C3AED' },
  };

  async function loadNews() {
    try {
      const rows = await fetchSheet('お知らせ');
      const visible = rows.filter(r => (r[3] || '').trim() !== '非表示' && r[2]);
      const list = document.getElementById('news-list');
      const count = document.getElementById('news-count');
      if (visible.length === 0) {
        list.innerHTML = '<div class="news-empty">お知らせはありません</div>';
        return;
      }
      count.textContent = `${visible.length}件`;
      list.innerHTML = visible.map(r => {
        const tag = (r[1] || '').trim();
        return `<div class="news-row">
          <span class="tag tag-${tag || 'default'}">${tag || '情報'}</span>
          <div class="news-body"><div class="news-title">${r[2] || ''}</div></div>
          <div class="news-date">${r[0] || ''}</div>
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('news-list').innerHTML = '<div class="news-empty">読み込みエラー</div>';
    }
  }

  async function loadKpi() {
    try {
      const rows = await fetchSheet('営業実績');
      rows.forEach(r => {
        const item = (r[0] || '').trim();
        const val  = parseFloat((r[1] || '0').replace(/,/g,'')) || 0;
        const ku   = (r[3] || '').trim();
        const id = ku === '高圧' ? {
          'ストックアップ': 'kpi-high-stock',
          '契約kW': 'kpi-high-kw',
          '拠点数': 'kpi-high-base',
          '5年将来収益': 'kpi-high-future',
        }[item] : {
          'ストックアップ': 'kpi-low-stock',
          '拠点数': 'kpi-low-base',
          '5年将来収益': 'kpi-low-future',
        }[item];
        if (id) document.getElementById(id).textContent = fmt(val);
      });
    } catch(e) {
      ['kpi-high-stock','kpi-high-kw','kpi-high-base','kpi-high-future',
       'kpi-low-stock','kpi-low-base','kpi-low-future'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = 'エラー';
      });
    }
  }

  function buildLinkGrid(rows, gridId) {
    const grid = document.getElementById(gridId);
    if (rows.length === 0) {
      grid.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-3);grid-column:span 3">データがありません</div>';
      return;
    }
    grid.innerHTML = rows.filter(r => r[0]).map(r => {
      const color = COLOR_MAP[r[4]] || COLOR_MAP.blue;
      return `<a class="link-cell" href="${r[2] || '#'}" target="_blank">
        <div class="link-ico" style="background:${color.bg}">
          <i class="ti ti-${r[3] || 'link'}" style="color:${color.fg}"></i>
        </div>
        <div>
          <div class="link-name">${r[0] || ''}</div>
          <div class="link-desc">${r[1] || ''}</div>
        </div>
        <i class="ti ti-chevron-right link-arrow"></i>
      </a>`;
    }).join('');
  }

  async function loadLinks() {
    try { buildLinkGrid(await fetchSheet('リンク集'), 'links-grid'); }
    catch(e) { document.getElementById('links-grid').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-3);grid-column:span 3">読み込みエラー</div>'; }
  }

  async function loadFlow() {
    try { buildLinkGrid(await fetchSheet('フロー別格納資料'), 'flow-grid'); }
    catch(e) { document.getElementById('flow-grid').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-3);grid-column:span 3">読み込みエラー</div>'; }
  }

  let scheduleRows = [];

  function filterSchedule(area, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('#schedule-body tr[data-area]').forEach(row => {
      if (area === 'all' || row.dataset.area === area) {
        row.classList.remove('hidden');
      } else {
        row.classList.add('hidden');
      }
    });
  }

  async function loadSchedule() {
    try {
      scheduleRows = await fetchSheet('エナリス申し込みスケジュール');
      const tbody = document.getElementById('schedule-body');
      const filterDiv = document.getElementById('schedule-filter');

      if (scheduleRows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="schedule-empty">データがありません</td></tr>';
        return;
      }

      const areas = [...new Set(scheduleRows.map(r => (r[0] || '').trim()).filter(Boolean))];
      const existingBtns = filterDiv.querySelectorAll('.filter-btn:not(:first-child)');
      existingBtns.forEach(b => b.remove());
      areas.forEach(area => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = area;
        btn.onclick = function() { filterSchedule(area, this); };
        filterDiv.appendChild(btn);
      });

      tbody.innerHTML = scheduleRows.filter(r => r[0]).map(r => {
        const area = (r[0] || '').trim();
        const isAll = area === '全エリア';
        const badgeClass = isAll ? 'area-badge all' : 'area-badge';
        const supply = (r[1] || '').replace(/・/g, '<br>・');
        const d8  = r[2] ? `<span class="date-val">${r[2]}</span>` : `<span class="date-empty">—</span>`;
        const d9  = r[3] ? `<span class="date-val">${r[3]}</span>` : `<span class="date-empty">—</span>`;
        const d10 = r[4] ? `<span class="date-val">${r[4]}</span>` : `<span class="date-empty">—</span>`;
        return `<tr data-area="${area}">
          <td><span class="${badgeClass}">${area}</span></td>
          <td class="supply-text">${supply}</td>
          <td class="date-cell">${d8}</td>
          <td class="date-cell">${d9}</td>
          <td class="date-cell">${d10}</td>
        </tr>`;
      }).join('');

    } catch(e) {
      document.getElementById('schedule-body').innerHTML =
        '<tr><td colspan="5" class="schedule-empty">読み込みエラー</td></tr>';
    }
  }

  loadNews();
  loadKpi();
  loadLinks();
  loadFlow();
  loadSchedule();
</script>
</body>
</html>
